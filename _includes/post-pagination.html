<br><hr>
<div class="pagination">
	{% if page.previous.url %}
	<a class="pagination-previous" href="{{ site.alternateurl }}{{ page.previous.url | replace: '//', '/' }}"
	data-toggle="tooltip" data-placement="top" title="{{ page.previous.title }}">
		{{ page.previous.title | truncate: 20 }}
	</a>
	{% else %}
	<a class="pagination-previous" href="{{ site.alternateurl }}{{ " / " }}">
		Back
	</a>
	{% endif %} {% if page.next.url %}
	<a class="pagination-next" href="{{ site.alternateurl }}{{ page.next.url | replace: '//', '/' }}"
	data-toggle="tooltip" data-placement="top" title="{{ page.next.title }}">
		{{ page.next.title | truncate: 20 }}
	</a>
	{% endif %}
</div>
