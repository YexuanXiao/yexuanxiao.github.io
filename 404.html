title: Page not found!
permalink: /404
---

<!DOCTYPE html>
<html lang="en-us">
	<head>
		<meta charset="utf-8">
		<link href="http://gmpg.org/xfn/11" rel="profile">
		<link href="{{ site.alternateurl }}/assets/manifest.webmanifest" rel="manifest">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>404 - Page not Found</title>
		<link rel="shortcut icon" href="{{ site.alternateurl }}/assets/images/favicon.png">
	</head>
	<body>
		<style>
			body { font-family: -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Oxygen,Ubuntu,Cantarell,Fira
			Sans,Droid Sans,Helvetica Neue,Helvetica,Arial,sans-serif; background-color:
			#363636; } a { text-decoration: none; } body { background: #fff; } .container
			{ display: flex; margin-top: 180px; justify-content: center; } @media (max-width:768px)
			{ .container { margin-top: 60px; align-items: center; flex-direction: column-reverse;
			} } .subtitle,.title { color: #646464; line-height: 1.4; } .title { font-weight:
			600; font-size: 200px; font-weight: bold; margin: 0;} @media (max-width:768px) { .title
			{ font-size: 100px; margin: revert;} } .subtitle { margin: 10px 0 10px 0; font-size: 28px;
			} .text { display: flex; min-width: 384px; align-items: flex-start; flex-direction:
			column; justify-content: center; } @media (max-width:768px) { .text { min-width:
			auto; align-items: center; } } .button { background:
			0 0; text-align: center; font-size: 14px; cursor: pointer; padding: 0 16px;
			border: 1px solid; border-radius: 3px; line-height: 32px; border-color:
			#08F; background-color: #08F; color: #fff; margin-top: 20px; } .button:focus
			{ outline: 0; box-shadow: 0 0 0 2px #fff,0 0 0 4px rgba(0,132,255,.3);
			transition: box-shadow .3s; } .button:hover { border-color: #0077e6; background-color:
			#0077e6; } .backto { display: flex; margin-top: 20px; color: #08F; font-weight:
			600; font-size: 14px; align-items: center; } body { -moz-user-select: none;
			-webkit-user-select: none; -ms-user-select: none; user-select: none; } h3 {color:
			#646464; position:relative; text-align: center; }
		</style>
		<div class="container">
			<div class="text">
				<h1 class="title">404</h1>
				<p class="subtitle">Whoops, that page is gone.</p>
				<input class="button" type="button" value="Home">
				<div class="backto">
					<span>or return in&#8196;</span>
					<span id="second">10</span>
					<span>&#8196;seconds.</span>
				</div>
			</div>
		</div>
		<div class="container">
			<h3>
				Contact us :
				<a href="mailto:{{ site.author.email }}?subject=Feedback&body=Type%20your%20question,%20provide%20error%20or%20feedback%20wrong%20here." style="color:#08F">
					{{ site.author.name }}
				</a>
			</h3>
		</div>
		<script>
			document.body.addEventListener('dragstart', () => false);
			document.body.querySelector('.button').addEventListener('click', () => {window.location.replace('/')});
			var num = document.getElementById('second').innerHTML;
			function count() {
				num--;
				document.getElementById('second').innerHTML = num;
				if (num == 0) {
					window.history.back()
				} else if (num < 0){
					window.location.replace('/')
				}
			}
			setInterval('count()', 1000);
		</script>
	</body>
</html>
